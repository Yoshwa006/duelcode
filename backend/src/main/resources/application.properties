spring.application.name=comp

# Database Configuration - Use environment variables in production
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:NewStrongPassword123!}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:comp}
spring.jpa.hibernate.ddl-auto=update

# Show SQL statements
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.results.bind=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JWT Configuration - Use environment variables in production
jwt.secret=${JWT_SECRET:MTIzNDU2Nzg5MGFiY2RlZmdoaWprbG1ub3BxcnN0dXZ3eHl6}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Redis Configuration (disabled for testing)
# spring.data.redis.host=${REDIS_HOST:localhost}
# spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=simple

# ElasticSearch Configuration (optional)
spring.data.elasticsearch.repositories.enabled=${ELASTIC_ENABLED:false}
spring.elasticsearch.uris=${ELASTIC_URI:http://localhost:9200}

# Mail Configuration - Use environment variables in production
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Application Configuration
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}
app.judge.api-url=${JUDGE_API_URL:http://localhost:3001}
app.mail.default-recipient=${DEFAULT_MAIL_RECIPIENT:}

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
